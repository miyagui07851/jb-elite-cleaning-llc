<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>J&B Elite Commercial Cleaning LLC | Commercial Cleaning Services NY</title>
  <meta name="description" content="Professional commercial cleaning for offices, medical facilities, restaurants, banks, post-construction projects and more across Westchester, Bronx and Manhattan.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <a class="brand" href="#home" data-page="home" aria-label="J&B Elite Commercial Cleaning LLC home">
    <img src="images/company-icon.png" alt="J&B Elite company logo icon" class="brand-icon">
    <span class="brand-text"><strong><span>J&B</span> ELITE</strong><small>COMMERCIAL CLEANING LLC</small></span>
  </a>
  <button class="mobile-menu" aria-label="Open menu">☰</button>
  <nav class="nav" aria-label="Main navigation">
    <a href="#services" data-page="services">Services</a>
    <a href="#why" data-page="why">Why Us</a>
    <a href="#process" data-page="process">Process</a>
    <a href="#areas" data-page="areas">Areas</a>
    <a href="#estimate" data-page="estimate">Estimate</a>
    <a href="#contact" data-page="contact">Contact</a>
    <a class="quote-btn" href="#quote" data-page="quote">Free Quote</a>
  </nav>
</header>

<img class="peek-juanito" src="images/juanito-peek-head.png" alt="Juanito peeking from the right side of the screen">

<main id="app" class="page-shell" tabindex="-1"></main>

<section class="juanito-chat" id="juanitoChat" aria-label="Juanito assistant">
  <button class="chat-close" id="chatClose" aria-label="Minimize Juanito assistant">×</button>
  <div class="chat-top">
    <img src="images/juanito-hello-clean.png" alt="Juanito assistant waving" class="chat-juanito">
    <div>
      <h3>Hello, I’m Juanito 👋</h3>
      <p>How can I help you?</p>
    </div>
  </div>
  <div class="quick-actions">
    <button data-ask="services">Services</button>
    <button data-ask="estimate">Estimate</button>
    <button data-ask="areas">Service Areas</button>
    <button data-ask="quote">Free Quote</button>
    <button data-ask="contact">Contact</button>
  </div>
  <label for="chatInput">Ask a question</label>
  <div class="chat-input-row">
    <input id="chatInput" type="text" placeholder="Example: medical cleaning, price, Bronx...">
    <button id="chatAsk">Ask</button>
  </div>
  <div class="chat-answer" id="chatAnswer">Click an option or type a question. I’ll take you to the right page.</div>
</section>
<button class="chat-bubble hidden" id="chatBubble" aria-label="Open Juanito assistant"><img src="images/juanito-hello-clean.png" alt="Juanito"></button>
<button class="to-top" id="toTop" aria-label="Back to top">↑</button>

<script src="script.js"></script>
</body>
</html>
